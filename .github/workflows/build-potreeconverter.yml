name: Build Scan2BIM Converter

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/build-potreeconverter.yml

jobs:
  build-macos-arm:
    runs-on: macos-14
    steps:
      - name: Install build dependencies
        run: brew install cmake tbb

      - name: Clone PotreeConverter
        run: git clone --depth 1 --branch 2.1.2 https://github.com/potree/PotreeConverter.git

      - name: Patch PotreeConverter for macOS
        working-directory: PotreeConverter
        run: |
          set -euxo pipefail

          # 1a. Header: widen __linux__ to also cover __APPLE__ so
          #     fseek_64_all_platforms is declared on macOS. Alias *64 stdio.
          HDR=Converter/modules/unsuck/unsuck.hpp
          sed -i.bak1 's/defined(__linux__)/defined(__linux__) || defined(__APPLE__)/g' "$HDR"
          sed -i.bak2 's/fseeko64/fseeko/g; s/ftello64/ftello/g; s/fopen64/fopen/g' "$HDR"

          # 1b. unsuck_platform_specific.cpp: do NOT widen the Linux block,
          #     it uses sys/sysinfo.h and /proc/self/status which don't exist
          #     on macOS. Instead, insert a fresh #elif __APPLE__ block right
          #     before the final #endif with stub implementations. echo lines
          #     used instead of a heredoc so YAML's block-scalar indentation
          #     stays consistent.
          PSF=Converter/modules/unsuck/unsuck_platform_specific.cpp
          LAST_ENDIF=$(grep -n '^#endif' "$PSF" | tail -1 | cut -d: -f1)
          {
            head -n $((LAST_ENDIF - 1)) "$PSF"
            echo ""
            echo "#elif defined(__APPLE__)"
            echo "// macOS stubs - no live memory / CPU stats."
            echo "MemoryData getMemoryData() { return MemoryData{}; }"
            echo "void printMemoryReport() {}"
            echo "void launchMemoryChecker(int64_t maxMB, double checkInterval) {}"
            echo "void init() {}"
            echo "CpuData getCpuData() { return CpuData{}; }"
            echo ""
            tail -n +${LAST_ENDIF} "$PSF"
          } > "$PSF.tmp"
          mv "$PSF.tmp" "$PSF"

          # 2. AppleClang's libc++ has NO std::execution policies at all.
          #    Neuter the declaration; strip the leading 'parallel,' argument
          #    from algorithm calls (both with and without std:: prefix --
          #    PotreeConverter uses 'using namespace std' so plenty of calls
          #    are bare for_each(parallel, ...)).
          find Converter -type f \( -name '*.h' -o -name '*.hpp' -o -name '*.cpp' \) -print0 \
            | xargs -0 sed -i.bak3 \
                -e 's|auto parallel = std::execution::[a-zA-Z_]*;|[[maybe_unused]] int parallel = 0;|g'

          find Converter -type f \( -name '*.h' -o -name '*.hpp' -o -name '*.cpp' \) -print0 \
            | xargs -0 sed -i.bak4 \
                -e 's|for_each(parallel,|for_each(|g' \
                -e 's|sort(parallel,|sort(|g' \
                -e 's|transform(parallel,|transform(|g' \
                -e 's|any_of(parallel,|any_of(|g' \
                -e 's|all_of(parallel,|all_of(|g' \
                -e 's|none_of(parallel,|none_of(|g' \
                -e 's|reduce(parallel,|reduce(|g' \
                -e 's|find(parallel,|find(|g' \
                -e 's|accumulate(parallel,|accumulate(|g' \
                -e 's|count(parallel,|count(|g' \
                -e 's|count_if(parallel,|count_if(|g'

          # 3. Narrowing fix in sampler_poisson.h.
          sed -i.bak5 's/Point point = { x, y, z, i, childIndex };/Point point = { x, y, z, static_cast<int32_t>(i), static_cast<int32_t>(childIndex) };/' Converter/include/sampler_poisson.h

          # 4. Drop the TBB link line from CMakeLists.txt. Since we removed
          #    all std::execution usage in step 2, libtbb is dead weight on
          #    macOS - and the bare 'tbb' name fails to resolve to Homebrew's
          #    libtbb.dylib at link time. Same logic: also relax the
          #    find_package(TBB REQUIRED) to optional, so cmake doesn't fail
          #    if tbb isn't installed at all.
          sed -i.bak6 's|target_link_libraries(${PROJECT_NAME} tbb)|# tbb link removed on macOS (std::execution stripped at source level)|' CMakeLists.txt
          sed -i.bak7 's|find_package(TBB REQUIRED)|find_package(TBB)|' CMakeLists.txt

          # 4. Drop the noisy *.bak files so sanity grep + the eventual
          #    build don't include them.
          find Converter -name '*.bak*' -delete

          # 5. Final sanity grep (excludes any .bak crud left by sed -i.bak).
          echo "=== std::execution survivors (should be empty) ==="
          grep -rn 'std::execution' Converter --include='*.h' --include='*.hpp' --include='*.cpp' | head -10 || true
          echo "=== for_each(parallel, survivors (should be empty) ==="
          grep -rn 'for_each(parallel,' Converter --include='*.h' --include='*.hpp' --include='*.cpp' | head -10 || true
          echo "=== fseek_64_all_platforms decl/call sites ==="
          grep -rn 'fseek_64_all_platforms' Converter --include='*.h' --include='*.hpp' --include='*.cpp' | head -20 || true
          echo "=== #if defined(__linux__) / #elif defined(__linux__) survivors ==="
          grep -rn 'defined(__linux__)' Converter --include='*.h' --include='*.hpp' --include='*.cpp' | grep -v '__APPLE__' | head -10 || true

      - name: Configure
        working-directory: PotreeConverter
        run: |
          BREW_PREFIX="$(brew --prefix)"
          TBB_PREFIX="$(brew --prefix tbb)"
          TBB_CMAKE_DIR=""
          for cand in "$TBB_PREFIX/lib/cmake/TBB" "$TBB_PREFIX/lib/cmake/tbb" "$TBB_PREFIX/lib/cmake"; do
            if [ -d "$cand" ]; then TBB_CMAKE_DIR="$cand"; break; fi
          done
          CMAKE_ARGS=(
            -B build
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
            "-DCMAKE_PREFIX_PATH=$TBB_PREFIX;$BREW_PREFIX"
            "-DCMAKE_CXX_FLAGS=-Wno-c++11-narrowing -Wno-error -Wno-deprecated-declarations"
          )
          if [ -n "$TBB_CMAKE_DIR" ]; then CMAKE_ARGS+=("-DTBB_DIR=$TBB_CMAKE_DIR"); fi
          cmake "${CMAKE_ARGS[@]}"

      - name: Build
        working-directory: PotreeConverter
        run: cmake --build build --config Release -j $(sysctl -n hw.ncpu)

      - name: Stage artifact tree
        working-directory: PotreeConverter
        run: |
          set -e
          mkdir -p dist
          cp build/PotreeConverter dist/
          [ -d build/resources ] && cp -R build/resources dist/ || true
          [ -d build/licenses ]  && cp -R build/licenses dist/ || true
          ls -la dist

      - name: Upload PotreeConverter (macOS ARM)
        uses: actions/upload-artifact@v4
        with:
          name: potreeconverter-darwin-arm64
          path: PotreeConverter/dist/
          retention-days: 90

  build-linux-x64:
    runs-on: ubuntu-22.04
    steps:
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libtbb-dev

      - name: Clone PotreeConverter
        run: git clone --depth 1 --branch 2.1.2 https://github.com/potree/PotreeConverter.git

      - name: Configure
        working-directory: PotreeConverter
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: PotreeConverter
        run: cmake --build build --config Release -j $(nproc)

      - name: Stage artifact tree
        working-directory: PotreeConverter
        run: |
          set -e
          mkdir -p dist
          cp build/PotreeConverter dist/
          [ -d build/resources ] && cp -R build/resources dist/ || true
          [ -d build/licenses ]  && cp -R build/licenses dist/ || true
          ls -la dist

      - name: Upload PotreeConverter (Linux x64)
        uses: actions/upload-artifact@v4
        with:
          name: potreeconverter-linux-x64
          path: PotreeConverter/dist/
          retention-days: 90

  build-app-linux:
    needs: build-linux-x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            patchelf

      - name: Install Miniforge
        run: |
          wget -q https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh -O miniforge.sh
          bash miniforge.sh -b -p $HOME/miniforge
          echo "$HOME/miniforge/bin" >> $GITHUB_PATH

      - name: Install PDAL via conda
        run: $HOME/miniforge/bin/conda create -p ./pdal-env -c conda-forge pdal --yes --quiet

      - name: Download PotreeConverter artifact
        uses: actions/download-artifact@v4
        with:
          name: potreeconverter-linux-x64
          path: ./binaries-linux/

      - name: Stage binaries
        run: |
          chmod +x ./binaries-linux/PotreeConverter
          mkdir -p binaries-linux/pdal/bin binaries-linux/pdal/lib binaries-linux/pdal/share
          cp ./pdal-env/bin/pdal binaries-linux/pdal/bin/
          cp -aL ./pdal-env/lib/. binaries-linux/pdal/lib/
          cp -R ./pdal-env/share/gdal binaries-linux/pdal/share/  || true
          cp -R ./pdal-env/share/proj binaries-linux/pdal/share/  || true
          du -sh binaries-linux

      - name: npm install
        run: npm install --no-audit --no-fund

      - name: Build Tauri release
        run: npm run build

      - name: Package portable tar.gz
        run: bash scripts/package-linux.sh

      - name: Upload final Linux portable
        uses: actions/upload-artifact@v4
        with:
          name: scan2bim-converter-linux-x64
          path: dist/*.tar.gz
          retention-days: 90

  build-app-macos:
    needs: build-macos-arm
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Miniforge
        run: |
          curl -sL https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-MacOSX-arm64.sh -o miniforge.sh
          bash miniforge.sh -b -p $HOME/miniforge
          echo "$HOME/miniforge/bin" >> $GITHUB_PATH

      - name: Install PDAL via conda
        run: $HOME/miniforge/bin/conda create -p ./pdal-env -c conda-forge pdal --yes --quiet

      - name: Download PotreeConverter artifact
        uses: actions/download-artifact@v4
        with:
          name: potreeconverter-darwin-arm64
          path: ./binaries-mac/

      - name: Stage binaries
        run: |
          chmod +x ./binaries-mac/PotreeConverter
          mkdir -p binaries-mac/pdal/bin binaries-mac/pdal/lib binaries-mac/pdal/share
          cp ./pdal-env/bin/pdal binaries-mac/pdal/bin/
          cp -aL ./pdal-env/lib/. binaries-mac/pdal/lib/
          cp -R ./pdal-env/share/gdal binaries-mac/pdal/share/ || true
          cp -R ./pdal-env/share/proj binaries-mac/pdal/share/ || true
          du -sh binaries-mac

      - name: npm install
        run: npm install --no-audit --no-fund

      - name: Build Tauri release
        run: npm run build

      - name: Package portable zip
        run: bash scripts/package-macos.sh

      - name: Upload final macOS portable
        uses: actions/upload-artifact@v4
        with:
          name: scan2bim-converter-macos-arm64
          path: dist/*.zip
          retention-days: 90
