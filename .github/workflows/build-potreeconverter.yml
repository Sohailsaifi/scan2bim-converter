name: Build Scan2BIM Converter

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/build-potreeconverter.yml

jobs:
  build-macos-arm:
    runs-on: macos-14
    steps:
      - name: Install build dependencies
        run: brew install cmake tbb

      - name: Clone PotreeConverter
        run: git clone --depth 1 --branch 2.1.2 https://github.com/potree/PotreeConverter.git

      - name: Patch PotreeConverter for macOS
        working-directory: PotreeConverter
        run: |
          set -euxo pipefail
          PSF=Converter/modules/unsuck/unsuck_platform_specific.cpp
          sed -i.bak 's/#elif defined(__linux__)/#elif defined(__linux__) || defined(__APPLE__)/' "$PSF"
          sed -i.bak2 's/fseeko64/fseeko/g; s/ftello64/ftello/g; s/fopen64/fopen/g' "$PSF"
          find Converter -type f \( -name '*.h' -o -name '*.hpp' -o -name '*.cpp' \) -print0 \
            | xargs -0 sed -i.bak3 -e 's/std::execution::par_unseq/std::execution::seq/g' \
                                   -e 's/std::execution::par\b/std::execution::seq/g'
          sed -i.bak4 's/Point point = { x, y, z, i, childIndex };/Point point = { x, y, z, static_cast<int32_t>(i), static_cast<int32_t>(childIndex) };/' Converter/include/sampler_poisson.h

      - name: Configure
        working-directory: PotreeConverter
        run: |
          BREW_PREFIX="$(brew --prefix)"
          TBB_PREFIX="$(brew --prefix tbb)"
          TBB_CMAKE_DIR=""
          for cand in "$TBB_PREFIX/lib/cmake/TBB" "$TBB_PREFIX/lib/cmake/tbb" "$TBB_PREFIX/lib/cmake"; do
            if [ -d "$cand" ]; then TBB_CMAKE_DIR="$cand"; break; fi
          done
          CMAKE_ARGS=(
            -B build
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
            "-DCMAKE_PREFIX_PATH=$TBB_PREFIX;$BREW_PREFIX"
            "-DCMAKE_CXX_FLAGS=-Wno-c++11-narrowing -Wno-error -Wno-deprecated-declarations"
          )
          if [ -n "$TBB_CMAKE_DIR" ]; then CMAKE_ARGS+=("-DTBB_DIR=$TBB_CMAKE_DIR"); fi
          cmake "${CMAKE_ARGS[@]}"

      - name: Build
        working-directory: PotreeConverter
        run: cmake --build build --config Release -j $(sysctl -n hw.ncpu)

      - name: Stage artifact tree
        working-directory: PotreeConverter
        run: |
          set -e
          mkdir -p dist
          cp build/PotreeConverter dist/
          [ -d build/resources ] && cp -R build/resources dist/ || true
          [ -d build/licenses ]  && cp -R build/licenses dist/ || true
          ls -la dist

      - name: Upload PotreeConverter (macOS ARM)
        uses: actions/upload-artifact@v4
        with:
          name: potreeconverter-darwin-arm64
          path: PotreeConverter/dist/
          retention-days: 90

  build-linux-x64:
    runs-on: ubuntu-22.04
    steps:
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libtbb-dev

      - name: Clone PotreeConverter
        run: git clone --depth 1 --branch 2.1.2 https://github.com/potree/PotreeConverter.git

      - name: Configure
        working-directory: PotreeConverter
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: PotreeConverter
        run: cmake --build build --config Release -j $(nproc)

      - name: Stage artifact tree
        working-directory: PotreeConverter
        run: |
          set -e
          mkdir -p dist
          cp build/PotreeConverter dist/
          [ -d build/resources ] && cp -R build/resources dist/ || true
          [ -d build/licenses ]  && cp -R build/licenses dist/ || true
          ls -la dist

      - name: Upload PotreeConverter (Linux x64)
        uses: actions/upload-artifact@v4
        with:
          name: potreeconverter-linux-x64
          path: PotreeConverter/dist/
          retention-days: 90

  build-app-linux:
    needs: build-linux-x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            patchelf

      - name: Install Miniforge
        run: |
          wget -q https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh -O miniforge.sh
          bash miniforge.sh -b -p $HOME/miniforge
          echo "$HOME/miniforge/bin" >> $GITHUB_PATH

      - name: Install PDAL via conda
        run: $HOME/miniforge/bin/conda create -p ./pdal-env -c conda-forge pdal --yes --quiet

      - name: Download PotreeConverter artifact
        uses: actions/download-artifact@v4
        with:
          name: potreeconverter-linux-x64
          path: ./binaries-linux/

      - name: Stage binaries
        run: |
          chmod +x ./binaries-linux/PotreeConverter
          mkdir -p binaries-linux/pdal/bin binaries-linux/pdal/lib binaries-linux/pdal/share
          cp ./pdal-env/bin/pdal binaries-linux/pdal/bin/
          cp -aL ./pdal-env/lib/. binaries-linux/pdal/lib/
          cp -R ./pdal-env/share/gdal binaries-linux/pdal/share/  || true
          cp -R ./pdal-env/share/proj binaries-linux/pdal/share/  || true
          du -sh binaries-linux

      - name: npm install
        run: npm install --no-audit --no-fund

      - name: Build Tauri release
        run: npm run build

      - name: Package portable tar.gz
        run: bash scripts/package-linux.sh

      - name: Upload final Linux portable
        uses: actions/upload-artifact@v4
        with:
          name: scan2bim-converter-linux-x64
          path: dist/*.tar.gz
          retention-days: 90

  build-app-macos:
    needs: build-macos-arm
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Miniforge
        run: |
          curl -sL https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-MacOSX-arm64.sh -o miniforge.sh
          bash miniforge.sh -b -p $HOME/miniforge
          echo "$HOME/miniforge/bin" >> $GITHUB_PATH

      - name: Install PDAL via conda
        run: $HOME/miniforge/bin/conda create -p ./pdal-env -c conda-forge pdal --yes --quiet

      - name: Download PotreeConverter artifact
        uses: actions/download-artifact@v4
        with:
          name: potreeconverter-darwin-arm64
          path: ./binaries-mac/

      - name: Stage binaries
        run: |
          chmod +x ./binaries-mac/PotreeConverter
          mkdir -p binaries-mac/pdal/bin binaries-mac/pdal/lib binaries-mac/pdal/share
          cp ./pdal-env/bin/pdal binaries-mac/pdal/bin/
          cp -aL ./pdal-env/lib/. binaries-mac/pdal/lib/
          cp -R ./pdal-env/share/gdal binaries-mac/pdal/share/ || true
          cp -R ./pdal-env/share/proj binaries-mac/pdal/share/ || true
          du -sh binaries-mac

      - name: npm install
        run: npm install --no-audit --no-fund

      - name: Build Tauri release
        run: npm run build

      - name: Package portable zip
        run: bash scripts/package-macos.sh

      - name: Upload final macOS portable
        uses: actions/upload-artifact@v4
        with:
          name: scan2bim-converter-macos-arm64
          path: dist/*.zip
          retention-days: 90
